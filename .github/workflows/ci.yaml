name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-go:
    name: Test Go SDK
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [blacksmith-4vcpu-ubuntu-2404, macos-latest]
        go-version: ['1.26']

    steps:
      - name: Check out opentelementry
        uses: actions/checkout@v6
        with:
          path: opentelementry

      # opentelementry-go/go.mod has a local `replace` for
      # runtime-go/telemetry (the Meter contract protoc-gen-telemetry's
      # generated code, and this SDK's Meter() adapter, bind to — not
      # published yet), pointing at ../../runtime-go/telemetry relative to
      # opentelementry-go. CI checks it out as a true sibling of the
      # `opentelementry` repo to match local development. Drop this checkout
      # (and the go.mod replace) once runtime-go/telemetry is published.
      - name: Check out runtime-go (for the runtime-go/telemetry replace)
        uses: actions/checkout@v6
        with:
          repository: the-protobuf-project/runtime-go
          path: runtime-go

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('opentelementry/opentelementry-go/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        working-directory: opentelementry/opentelementry-go
        run: go mod download

      - name: Verify go.mod is tidy
        working-directory: opentelementry/opentelementry-go
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Build
        working-directory: opentelementry/opentelementry-go
        run: go build -v ./...

      - name: Vet
        working-directory: opentelementry/opentelementry-go
        run: go vet ./...

      - name: Run tests
        working-directory: opentelementry/opentelementry-go
        run: go test -v -race ./...

      # examples/telemetry is its own isolated module (see its go.mod) so its
      # dependency graph never touches the root module's — verified
      # separately for the same reason it's isolated in the first place.
      - name: Build examples/telemetry (isolated module)
        working-directory: opentelementry/opentelementry-go/examples/telemetry
        run: go build -v ./...

      - name: Vet examples/telemetry
        working-directory: opentelementry/opentelementry-go/examples/telemetry
        run: go vet ./...

  test-proto:
    name: Lint & Build Proto
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: buf build
        run: buf build

      - name: buf lint
        run: buf lint

      - name: Generated stubs up to date
        run: |
          buf generate --template buf.gen.yaml
          if ! git diff --exit-code -- opentelementry-go/protobuf/; then
            echo "::error::stale protobuf stubs — rerun buf generate and commit"
            exit 1
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build protoc-gen-telemetry
        working-directory: opentelementry-go
        run: go build -o bin/protoc-gen-telemetry ./plugin/cmd/protoc-gen-telemetry

      - name: Example schema generates cleanly
        run: buf generate --template buf.gen.example.yaml

  test-rust:
    name: Test Rust SDK
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [blacksmith-4vcpu-ubuntu-2404, macos-latest]

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            opentelementry-rs/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build
        working-directory: ./opentelementry-rs
        run: cargo build --all-targets --all-features --verbose

      - name: Run tests
        working-directory: ./opentelementry-rs
        run: cargo test --all-features --verbose

  build-python:
    name: Build Python SDK
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        working-directory: ./opentelementry-py
        run: pip install .

      - name: Import smoke test
        run: python -c "import opentelementry; print('opentelementry', opentelementry.__all__)"

  build-cpp:
    name: Build C++ SDK
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build library and examples
        working-directory: ./opentelementry-cpp
        run: bazel build //...

  docker-compose:
    name: Test Docker Compose Stack
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Validate docker-compose.yaml
        working-directory: ./opentelementry-core
        run: docker compose config

      - name: Start observability stack
        working-directory: ./opentelementry-core
        run: |
          docker compose up -d
          sleep 30

      - name: Check service health
        working-directory: ./opentelementry-core
        run: |
          docker compose ps
          docker compose logs

      - name: Stop services
        working-directory: ./opentelementry-core
        if: always()
        run: docker compose down -v
