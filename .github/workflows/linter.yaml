name: Linting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-go:
    name: Lint Go Code
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Lint Go SDK
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: ./pulse-go
          args: --timeout=5m

  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Lint Markdown files
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'

  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .
          config_file: .yamllint.yml
          strict: true

  lint-rust:
    name: Lint Rust Code
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            pulse-rs/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        working-directory: ./pulse-rs
        run: cargo fmt --all -- --check

      - name: Run Clippy
        working-directory: ./pulse-rs
        run: cargo clippy --all-targets --all-features -- -D warnings

  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install linters
        run: pip install ruff mypy

      - name: Run Ruff linter
        working-directory: ./pulse-py
        run: ruff check .

      - name: Run Ruff formatter check
        working-directory: ./pulse-py
        run: ruff format --check .

  check-links:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          config-file: '.markdown-link-check.json'
          folder-path: '.'
          file-extension: '.md'
          check-modified-files-only: 'no'

  check-formatting:
    name: Check Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Check for trailing whitespace
        run: |
          FILES=$(grep -rln '[[:blank:]]$' \
            --include='*.md' --include='*.py' --include='*.go' \
            --include='*.rs' --include='*.yaml' --include='*.yml' \
            --include='*.toml' --include='*.json' . 2>/dev/null \
            | grep -v '.git/' | grep -v 'node_modules/' \
            | grep -v '_deps/' | grep -v '.venv/' | head -20)
          if [ -n "$FILES" ]; then
            echo "$FILES"
            echo "::error::Trailing whitespace found"
            exit 1
          fi

      - name: Check for missing newline at end of files
        run: |
          FILES=$(find . -type f \
            \( -name '*.md' -o -name '*.py' -o -name '*.go' \
               -o -name '*.rs' -o -name '*.yaml' -o -name '*.yml' \
               -o -name '*.toml' -o -name '*.json' \) \
            ! -path './.git/*' ! -path './node_modules/*' \
            ! -path './*/_deps/*' ! -path './.venv/*' \
            -exec sh -c \
              'test -s "$1" && test "$(tail -c 1 "$1" | wc -l)" -eq 0 && echo "$1"' \
              _ {} \; | head -20)
          if [ -n "$FILES" ]; then
            echo "$FILES"
            echo "::error::Files missing newline at end"
            exit 1
          fi

      - name: Check for large files
        run: |
          FILES=$(find . -type f -size +500k \
            ! -path './.git/*' ! -path './node_modules/*' \
            ! -path './*/_deps/*' ! -path './.venv/*' \
            ! -path './*/target/*' ! -path './*/build/*' | head -20)
          if [ -n "$FILES" ]; then
            echo "$FILES"
            echo "::warning::Large files detected (>500KB)"
          fi

      - name: Check for merge conflicts
        run: |
          FILES=$(grep -rln '^<\{7\} \|^=\{7\}$\|^>\{7\} ' \
            --include='*.md' --include='*.py' --include='*.go' \
            --include='*.rs' . 2>/dev/null \
            | grep -v '.git/' | head -20)
          if [ -n "$FILES" ]; then
            echo "$FILES"
            echo "::error::Merge conflict markers found"
            exit 1
          fi
