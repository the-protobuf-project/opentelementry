name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-python:
    name: Build Python distribution
    runs-on: ubuntu-latest
    env:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build sdist and wheel
        working-directory: ./opentelementry-py
        run: |
          pip install build
          python -m build

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: opentelementry-py/dist/*

      # Opt-in: publishes to PyPI only when a PYPI_API_TOKEN secret is configured.
      - name: Publish to PyPI
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ env.PYPI_API_TOKEN }}
          packages-dir: opentelementry-py/dist

  build-cpp:
    name: Build C++ artifact
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Build release library
        working-directory: ./opentelementry-cpp
        run: bazel build -c opt //src:opentelementry

      - name: Package headers and static library
        working-directory: ./opentelementry-cpp
        run: |
          mkdir -p dist/opentelementry-cpp
          cp -r include dist/opentelementry-cpp/
          cp bazel-bin/src/libopentelementry.a dist/opentelementry-cpp/
          tar -czf dist/opentelementry-cpp.tar.gz -C dist opentelementry-cpp

      - name: Upload C++ artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpp-dist
          path: opentelementry-cpp/dist/opentelementry-cpp.tar.gz

  package-rust:
    name: Package Rust crate
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify crates package cleanly
        working-directory: ./opentelementry-rs
        run: cargo package -p opentelementry-derive -p opentelementry --no-verify

      - name: Upload crate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-dist
          path: opentelementry-rs/target/package/*.crate

      # Opt-in: publishes to crates.io only when a CARGO_REGISTRY_TOKEN secret is configured.
      # Order matters — the derive crate must be published before the crates that depend on it.
      - name: Publish to crates.io
        if: ${{ startsWith(github.ref, 'refs/tags/') && env.CARGO_REGISTRY_TOKEN != '' }}
        working-directory: ./opentelementry-rs
        run: |
          cargo publish -p opentelementry-derive
          cargo publish -p opentelementry

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-python, build-cpp, package-rust]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/python-dist/*
            artifacts/cpp-dist/*
            artifacts/rust-dist/*
