version: v2

# Generates the example schema (examples/proto/jobs/v1/job.proto) that drives
# opentelementry-go/examples/telemetry: plain message stubs plus the
# protoc-gen-telemetry companion file, both landing in the same Go package so
# the example's main.go can import one package and use both.
#
# Run:  buf generate --template buf.gen.example.yaml
# Out:  opentelementry-go/examples/telemetry/gen/jobs/v1/jobsv1/{job.pb.go,job_telemetry.pb.go}
#
# protoc-gen-telemetry must be built first (bin/protoc-gen-telemetry — see
# opentelementry-go/examples/telemetry/README or just `go build -o
# opentelementry-go/bin/protoc-gen-telemetry ./opentelementry-go/plugin/cmd/protoc-gen-telemetry`
# from the repo root).
# job.proto imports telemetry/v1/annotations.proto, so job.pb.go carries a
# cross-file Go import for it. That file's own go_package
# (github.com/the-protobuf-project/opentelementry-go/protobuf/telemetry/v1/telemetrypbv1)
# predates its nesting under opentelementry/opentelementry-go and doesn't
# match its real, go-list-verified import path — the same pre-existing
# mismatch buf.gen.yaml's own managed/override block works around for orm's
# stubs. Same fix, same reason, here.
managed:
  enabled: true
  override:
    - file_option: go_package
      path: telemetry/v1/annotations.proto
      value: github.com/the-protobuf-project/opentelementry/opentelementry-go/protobuf/telemetry/v1/telemetrypbv1
    - file_option: go_package
      path: telemetry/v1/tracing.proto
      value: github.com/the-protobuf-project/opentelementry/opentelementry-go/protobuf/telemetry/v1/telemetrypbv1
    - file_option: go_package
      path: telemetry/v1/metrics.proto
      value: github.com/the-protobuf-project/opentelementry/opentelementry-go/protobuf/telemetry/v1/telemetrypbv1

inputs:
  - directory: protobuf/examples/proto

plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: opentelementry-go
    opt:
      - module=github.com/the-protobuf-project/opentelementry/opentelementry-go

  - local: opentelementry-go/bin/protoc-gen-telemetry
    out: opentelementry-go
    opt:
      - module=github.com/the-protobuf-project/opentelementry/opentelementry-go
