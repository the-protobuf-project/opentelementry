[server]
http_port = 3000
domain = ${GRAFANA_DOMAIN}
enforce_domain = false
root_url = %(protocol)s://%(domain)s:6009/grafana/
serve_from_sub_path = true

[auth.anonymous]
enabled = true
org_role = Admin

[auth]
disable_login_form = true

[feature_toggles]
enable = traceqlEditor

[dashboards]
min_refresh_interval = 100ms

[plugins]
allow_loading_unsigned_plugins = grafana-pyroscope-app
