global:
  scrape_interval: 1s
  evaluation_interval: 1s

rule_files:
  - /etc/opentelemetry-stack/prometheus-rules.yaml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    metric_relabel_configs:
      # Keep thirdparty health metrics and push freshness timestamp.
      - source_labels: [__name__]
        regex: "^(thirdparty_.*|push_time_seconds)$"
        action: keep
      # Extra guardrails: drop default runtime/process metrics if present.
      - source_labels: [__name__]
        regex: "^(go_.*|process_.*|prometheus_.*|pushgateway_.*|scrape_.*|promhttp_.*|net_.*|up)$"
        action: drop

  - job_name: "pushgateway"
    static_configs:
      - targets: ["localhost:9091"]
    metric_relabel_configs:
      # Keep thirdparty health metrics and push freshness timestamp.
      - source_labels: [__name__]
        regex: "^(thirdparty_.*|push_time_seconds)$"
        action: keep
      # Extra guardrails: drop default runtime/process metrics if present.
      - source_labels: [__name__]
        regex: "^(go_.*|process_.*|prometheus_.*|pushgateway_.*|scrape_.*|promhttp_.*|net_.*|up)$"
        action: drop
