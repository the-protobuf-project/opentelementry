apiVersion: 1

providers:
  - name: "Opentelementry Dashboards"
    orgId: 1
    folder: "Opentelementry"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
