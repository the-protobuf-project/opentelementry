apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: 'Opentelementry Telemetry'
    folderUid: 'opentelementry'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
      foldersFromFilesStructure: false
