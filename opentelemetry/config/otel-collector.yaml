receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 512
  batch/cloud:
    timeout: 30s
    send_batch_size: 2048
    send_batch_max_size: 4096

connectors:
  spanmetrics:
    histogram:
      explicit:
        buckets: [2ms, 4ms, 6ms, 8ms, 10ms, 50ms, 100ms, 200ms, 400ms, 800ms, 1s, 1400ms, 2s, 5s, 10s, 15s]
    dimensions:
      - name: http.method
        default: GET
      - name: http.status_code
    dimensions_cache_size: 1000
    aggregation_temporality: "AGGREGATION_TEMPORALITY_CUMULATIVE"
    metrics_flush_interval: 5s
    namespace: traces

exporters:
  # Local backends
  otlphttp/loki:
    endpoint: "http://loki:3100/otlp"
  otlp/tempo:
    endpoint: tempo:3200
    tls:
      insecure: true
  prometheusremotewrite:
    endpoint: http://prometheus:9090/api/v1/write
    tls:
      insecure: true
  debug:
    verbosity: detailed
  # Cloud forwarding
  otlp/cloud:
    endpoint: ${env:OTEL_CLOUD_ENDPOINT}
    headers:
      Authorization: "Bearer ${env:OTEL_CLOUD_AUTH_TOKEN}"
    sending_queue:
      enabled: true
      num_consumers: 4
      queue_size: 1000
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

extensions:
  health_check: null

service:
  extensions:
    - health_check
  pipelines:
    # Local pipelines (immediate)
    logs:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - otlphttp/loki
        - debug
    metrics:
      receivers:
        - otlp
        - spanmetrics
      processors:
        - batch
      exporters:
        - prometheusremotewrite
        - debug
    traces:
      receivers:
        - otlp
      processors:
        - batch
      exporters:
        - otlp/tempo
        - spanmetrics
        - debug
    # Cloud pipelines (batched, 30s interval)
    logs/cloud:
      receivers:
        - otlp
      processors:
        - batch/cloud
      exporters:
        - otlp/cloud
    metrics/cloud:
      receivers:
        - otlp
        - spanmetrics
      processors:
        - batch/cloud
      exporters:
        - otlp/cloud
    traces/cloud:
      receivers:
        - otlp
      processors:
        - batch/cloud
      exporters:
        - otlp/cloud
