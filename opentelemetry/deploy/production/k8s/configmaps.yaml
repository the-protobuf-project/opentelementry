apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: pulse
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            auth:
              authenticator: bearertoken
          http:
            endpoint: 0.0.0.0:4318
            auth:
              authenticator: bearertoken

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      bearertoken:
        token: ${env:OTLP_AUTH_TOKEN}

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 180
        spike_limit_mib: 50

    connectors:
      spanmetrics:
        histogram:
          explicit:
            buckets: [2ms, 4ms, 6ms, 8ms, 10ms, 50ms, 100ms, 200ms, 400ms, 800ms, 1s, 1400ms, 2s, 5s, 10s, 15s]
        dimensions:
          - name: http.method
            default: GET
          - name: http.status_code
        dimensions_cache_size: 1000
        aggregation_temporality: "AGGREGATION_TEMPORALITY_CUMULATIVE"
        metrics_flush_interval: 5s
        namespace: traces

    exporters:
      otlphttp/loki:
        endpoint: "http://loki:3100/otlp"
      otlp/tempo:
        endpoint: tempo:3200
        tls:
          insecure: true
      prometheusremotewrite:
        endpoint: http://prometheus:9090/api/v1/write
        tls:
          insecure: true

    service:
      extensions:
        - health_check
        - bearertoken
      telemetry:
        logs:
          level: warn
        metrics:
          address: 0.0.0.0:8888
      pipelines:
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/loki]
        metrics:
          receivers: [otlp, spanmetrics]
          processors: [memory_limiter, batch]
          exporters: [prometheusremotewrite]
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/tempo, spanmetrics]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: pulse
data:
  prometheus.yaml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'pulse-eks'
        env: 'production'

    alerting:
      alertmanagers:
        - static_configs:
            - targets: [alertmanager:9093]

    rule_files:
      - /etc/prometheus/rules/*.yaml

    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: "otelcol"
        static_configs:
          - targets: ["otel-collector:8888"]
      - job_name: "loki"
        static_configs:
          - targets: ["loki:3100"]
      - job_name: "tempo"
        static_configs:
          - targets: ["tempo:3200"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: pulse
data:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'severity']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'default-receiver'
      routes:
        - match:
            severity: critical
          receiver: 'critical-alerts'
          group_wait: 0s
        - match:
            alert_type: local_system
          receiver: 'local-webhook'

    receivers:
      - name: 'default-receiver'
        webhook_configs:
          - url: 'http://alert-webhook:9095/webhook'
            send_resolved: true
      - name: 'critical-alerts'
        webhook_configs:
          - url: 'http://alert-webhook:9095/webhook/critical'
            send_resolved: true
      - name: 'local-webhook'
        webhook_configs:
          - url: 'http://alert-webhook:9095/webhook/local'
            send_resolved: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alerting-rules
  namespace: pulse
data:
  rules.yaml: |
    groups:
      - name: telemetry_alerts
        rules:
          - alert: HighErrorRate
            expr: |
              sum(rate(traces_spanmetrics_calls_total{status_code="STATUS_CODE_ERROR"}[5m])) 
              / sum(rate(traces_spanmetrics_calls_total[5m])) > 0.05
            for: 2m
            labels:
              severity: critical
              alert_type: local_system
            annotations:
              summary: "High error rate detected"
              description: "Error rate is {{ $value | humanizePercentage }}"

          - alert: HighLatency
            expr: histogram_quantile(0.95, sum(rate(traces_spanmetrics_latency_bucket[5m])) by (le)) > 2
            for: 5m
            labels:
              severity: warning
              alert_type: local_system
            annotations:
              summary: "High latency detected"
              description: "P95 latency is {{ $value }}s"

          - alert: ServiceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
              alert_type: local_system
            annotations:
              summary: "Service {{ $labels.job }} is down"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: pulse
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: warn
    common:
      instance_addr: 127.0.0.1
      path_prefix: /data
      storage:
        filesystem:
          chunks_directory: /data/chunks
          rules_directory: /data/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    limits_config:
      retention_period: 168h
    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    ruler:
      alertmanager_url: http://alertmanager:9093
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: pulse
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 3201
      log_level: warn
    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
    ingester:
      max_block_duration: 5m
    compactor:
      compaction:
        block_retention: 168h
    storage:
      trace:
        backend: local
        wal:
          path: /var/tempo/wal
        local:
          path: /var/tempo/blocks
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: pulse
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: false
        editable: true
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki:3100
        isDefault: false
        editable: true
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo:3201
        isDefault: false
        editable: true
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
          tracesToMetrics:
            datasourceUid: prometheus
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
      - name: Alertmanager
        type: alertmanager
        uid: alertmanager
        access: proxy
        url: http://alertmanager:9093
        jsonData:
          implementation: prometheus
