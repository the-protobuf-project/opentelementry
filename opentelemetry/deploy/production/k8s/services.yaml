apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: pulse
  labels:
    app: otel-collector
spec:
  type: ClusterIP
  ports:
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
    - port: 4318
      targetPort: 4318
      name: otlp-http
    - port: 8888
      targetPort: 8888
      name: metrics
  selector:
    app: otel-collector
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: pulse
  labels:
    app: prometheus
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      name: http
  selector:
    app: prometheus
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: pulse
  labels:
    app: alertmanager
spec:
  type: ClusterIP
  ports:
    - port: 9093
      targetPort: 9093
      name: http
  selector:
    app: alertmanager
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: pulse
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: 3100
      name: http
  selector:
    app: loki
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  namespace: pulse
  labels:
    app: tempo
spec:
  type: ClusterIP
  ports:
    - port: 3200
      targetPort: 3200
      name: http
    - port: 3201
      targetPort: 3201
      name: grpc
  selector:
    app: tempo
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: pulse
  labels:
    app: grafana
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: grafana
---
# External service for OTLP ingestion (LoadBalancer for EKS)
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-external
  namespace: pulse
  labels:
    app: otel-collector
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  ports:
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
    - port: 4318
      targetPort: 4318
      name: otlp-http
  selector:
    app: otel-collector
