syntax = "proto3";

package telemetry.v1;

option go_package = "github.com/the-protobuf-project/opentelementry-go/protobuf/telemetry/v1/telemetrypbv1;telemetrypbv1";
option java_multiple_files = true;
option java_outer_classname = "MetricsProto";
option java_package = "com.telemetry.v1";

// metrics.proto holds the metrics half of telemetry.v1: MetricFieldOptions
// below tunes which fields become metric labels on the inferred lifecycle
// metrics (op counter + duration histogram) protoc-gen-telemetry generates,
// and separately lets a numeric field be recorded as its own metric (a value,
// not a label) with an auto-detected or explicit instrument kind. The richer
// custom-metric annotations (an application raising its own named metric not
// tied to any one field, e.g. "book_checked_out_total") are a separate,
// larger addition reserved for later.
//
// Applied via:
//
//	string region = 6 [(telemetry.v1.metric_field) = { label: true }];   // force a normally-excluded field in
//	bool is_active = 7 [(telemetry.v1.metric_field) = { label: false }]; // opt an auto-labeled field out
//	int32 page_count = 8 [(telemetry.v1.metric_field) = { value: true }]; // record as its own metric, kind auto-detected (GAUGE here)
//	double duration_ms = 9 [(telemetry.v1.metric_field) = { value: true, kind: METRIC_KIND_HISTOGRAM, unit: "ms" }]; // explicit kind + unit
message MetricFieldOptions {
  // label overrides telemetry.v1's inference for this field (bool and enum
  // fields are labeled by default; everything else is not, since metric
  // labels must stay low-cardinality — see tracing.proto's TelemetryFieldOptions
  // doc for why spans don't have this restriction). Explicit presence is what
  // makes this an override rather than a default: unset inherits inference,
  // true forces a field in (protoc-gen-telemetry warns at generate time if the
  // field's type makes it a poor label candidate), false opts an
  // auto-inferred field out.
  optional bool label = 1;

  // label_key overrides the metric label key for this field. Defaults to
  // the field's snake_case name.
  string label_key = 2;

  // value opts this field in as its own recorded metric (a Counter,
  // UpDownCounter, Gauge, or Histogram instrument — see kind), in addition to
  // (or instead of) being a label. Only meaningful on a numeric field
  // (int32/64, uint32/64, float, double); protoc-gen-telemetry warns and
  // ignores it on any other field type, since there's no such thing as a
  // string- or message-valued instrument. Unlike label, value has no
  // inference of its own to override — a field only becomes a value metric
  // when this is explicitly true, since not every numeric field (e.g. a
  // "version" counter-of-a-different-kind) is metric-worthy.
  bool value = 3;

  // kind selects the instrument a value field (value=true) is recorded
  // through. METRIC_KIND_UNSPECIFIED (the default) auto-detects; see
  // MetricKind's doc for the exact rule.
  MetricKind kind = 4;

  // metric overrides the generated metric's name for a value field. Defaults
  // to "<resource_snake>_<field_snake>".
  string metric = 5;

  // unit overrides a value field's instrument unit (UCUM-style, e.g. "1",
  // "ms", "By"). Defaults to "1", except an auto-detected METRIC_KIND_HISTOGRAM
  // defaults to "ms".
  string unit = 6;

  // buckets overrides a value field's histogram bucket boundaries. Only
  // meaningful when kind resolves to METRIC_KIND_HISTOGRAM (explicitly or by
  // auto-detection); ignored otherwise.
  repeated double buckets = 7;
}

// MetricKind selects the instrument a value field (MetricFieldOptions.value)
// is recorded through.
enum MetricKind {
  // Auto-detect: a field name that looks duration/size-like ("latency",
  // "duration_ms", "size_bytes", "elapsed", ...) resolves to
  // METRIC_KIND_HISTOGRAM; everything else resolves to METRIC_KIND_GAUGE.
  // METRIC_KIND_COUNTER and METRIC_KIND_UP_DOWN_COUNTER are never
  // auto-detected — a single scalar field can't safely be assumed monotonic —
  // so pick one explicitly via MetricFieldOptions.kind when that's what you
  // want.
  METRIC_KIND_UNSPECIFIED = 0;
  // Counter is a monotonic increasing instrument, e.g. "total number of
  // requests". It is the only instrument that can be used with a
  // METRIC_KIND_HISTOGRAM, which is a special case of a counter that
  // records the distribution of values over time.
  METRIC_KIND_COUNTER = 1;
  // UpDownCounter is a non-monotonic instrument, e.g. "current number of
  // active users". It can go up and down, but is still a single scalar value
  // at any given time.
  METRIC_KIND_UP_DOWN_COUNTER = 2;
  // Gauge records a single scalar value at the time it's set, e.g. "current
  // queue depth". This is the default auto-detected kind.
  METRIC_KIND_GAUGE = 3;
  // Histogram records the statistical distribution of values over time,
  // e.g. request latency buckets.
  METRIC_KIND_HISTOGRAM = 4;
}
